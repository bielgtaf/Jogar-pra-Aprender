<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogar para Aprender</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    margin:0;
}
header{
    text-align:center;
    padding:30px;
    background:#1e293b;
}
.logo{
    width:120px;
    image-rendering:pixelated;
}
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    padding:20px;
}
.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,.3);
}
button{
    padding:10px;
    margin:5px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    background:#334155;
    color:white;
}
button:hover{
    background:#475569;
}
.barra-xp{
    width:100%;
    height:12px;
    background:#0f172a;
    border-radius:10px;
    margin-top:10px;
    overflow:hidden;
}
.xp-preenchido{
    height:100%;
    width:0%;
    background:#22c55e;
    transition:0.3s;
}
</style>

</head>
<body>

<header>
<img src="logo.png" class="logo">
<h1>Jogar para Aprender</h1>
<p>Aprenda programação jogando e evolua seu conhecimento.</p>
</header>

<div class="container">

<div class="card">
<h2>👤 Perfil</h2>

<p><b>Jogador:</b> <span id="nomeJogador"></span></p>

<p><b>Nível:</b> <span id="nivel">1</span></p>
<p><b>XP:</b> <span id="xp">0</span>/100</p>

<div class="barra-xp">
<div id="barraXp" class="xp-preenchido"></div>
</div>

<p><b>Pontos:</b> <span id="pontos">0</span></p>
<p><b>Perguntas:</b> <span id="respondidas">0</span></p>

<button onclick="trocarJogador()">
🔄 Trocar Jogador
</button>

</div>

<div class="card" id="quiz">
<h2>💻 Quiz de Programação</h2>

<h3 id="pergunta">Carregando...</h3>

<div id="opcoes"></div>

<div id="resultado"></div>

</div>

<div class="card">
<h2>🏆 Ranking</h2>
<ol id="rankingLista"></ol>
</div>

<div class="card">
<h2>📊 Estatísticas</h2>
<p>Acertos: <span id="acertos">0</span></p>
<p>Erros: <span id="erros">0</span></p>
<p>Taxa de acerto: <span id="taxa">0%</span></p>
</div>

</div>

<script>

const perguntas = [
{
pergunta:"O que é programação?",
opcoes:["Desenhar","Criar instruções para computador","Jogos","Internet"],
correta:1
},
{
pergunta:"O que é algoritmo?",
opcoes:["Jogo","Passos para resolver problema","Imagem","Site"],
correta:1
},
{
pergunta:"HTML serve para?",
opcoes:["Estrutura web","Banco de dados","Jogo","Imagem"],
correta:0
},
{
pergunta:"CSS serve para?",
opcoes:["Estilo","Banco","Download","Vídeo"],
correta:0
},
{
pergunta:"JavaScript serve para?",
opcoes:["Interatividade","Imagem","PDF","Som"],
correta:0
}
];

function trocarJogador(){
localStorage.removeItem("nome");
location.reload();
}

perguntas.sort(() => Math.random() - 0.5);

let i = 0;

let xp = 0;
let nivel = 1;
let pontos = 0;
let respondidas = 0;
let acertos = 0;
let erros = 0;

let nome = localStorage.getItem("nome") || prompt("Seu nome:");

localStorage.setItem("nome", nome);

let ranking =
JSON.parse(localStorage.getItem("ranking")) || [];
function salvar(){
localStorage.setItem(
"ranking",
JSON.stringify(ranking)
);
}

function atualizar(){

document.getElementById("nomeJogador").innerText = nome;

document.getElementById("xp").innerText = xp;
document.getElementById("nivel").innerText = nivel;
document.getElementById("pontos").innerText = pontos;
document.getElementById("respondidas").innerText = respondidas;

document.getElementById("acertos").innerText = acertos;
document.getElementById("erros").innerText = erros;

let taxa =
respondidas
? Math.round((acertos/respondidas)*100)
: 0;

document.getElementById("taxa").innerText =
taxa + "%";

document.getElementById("barraXp").style.width =
Math.min(xp,100) + "%";
}

function mostrar(){

document.getElementById("pergunta").innerText =
perguntas[i].pergunta;

let op =
document.getElementById("opcoes");

op.innerHTML = "";

perguntas[i].opcoes.forEach((o,idx)=>{

let b = document.createElement("button");
b.innerText = o;
b.onclick = () => responder(idx);

op.appendChild(b);

});

}

function responder(idx){

respondidas++;

if(idx === perguntas[i].correta){

xp += 40;
pontos += 10;
acertos++;

document.getElementById("resultado").innerHTML =
"✅ Correto! +10 pontos";

}else{

erros++;

document.getElementById("resultado").innerHTML =
"❌ Errado!";

}

if(xp >= 100){
nivel++;
xp -= 100;
}

i++;

if(i < perguntas.length){
mostrar();
}else{
fim();
}

atualizar();

}

function fim(){

const existente =
ranking.find(j => j.nome === nome);

if(existente){

existente.pontos = pontos;
existente.nivel = nivel;

}else{

ranking.push({
nome:nome,
pontos:pontos,
nivel:nivel
});

}

ranking.sort(
(a,b)=>b.pontos-a.pontos
);

salvar();

carregarRanking();

document.getElementById("quiz").innerHTML = `
<h2>🏁 Fim do Jogo</h2>

<p>${nome}</p>

<p>Pontos: ${pontos}</p>

<p>Nível: ${nivel}</p>

<button onclick="location.reload()">
Jogar novamente
</button>
`;

}

function carregarRanking(){

let html = "";

ranking.slice(0,10).forEach(p=>{

html += `
<li>
${p.nome}
 - ${p.pontos} pts
 (Nível ${p.nivel})
</li>
`;

});

document.getElementById("rankingLista").innerHTML =
html;

}

carregarRanking();
mostrar();
atualizar();

</script>

</body>
</html>
